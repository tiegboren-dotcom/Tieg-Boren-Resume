<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Game</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(to bottom, #5db3ff, #0b3d91); overflow: hidden; color: white; text-align: center; }
#gameArea { position: relative; width: 100vw; height: 80vh; overflow: hidden; border-top: 3px solid white; border-bottom: 3px solid white; }
.fish { position: absolute; font-size: 40px; cursor: pointer; user-select: none; }
#scoreBoard { font-size: 24px; margin: 10px 0 5px 0; font-weight: bold; }
.game-key { font-size: 16px; margin-bottom: 15px; background: rgba(0,0,0,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px; }
.homeButton { position: absolute; top: 10px; right: 10px; background: white; color: #0b3d91; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 8px; z-index: 1000; }
#rod { position: absolute; top: 80px; left: 30px; width: 130px; height: 5px; background: linear-gradient(to right, #6b3f1d, #3b2412); border-radius: 4px; transform-origin: 10% 50%; transform: rotate(-20deg); z-index: 1000; }
#rod::before { content: ""; position: absolute; left: -18px; top: -7px; width: 25px; height: 18px; background: #2b1a0d; border-radius: 5px; }
#rod::after { content: ""; position: absolute; left: -8px; top: -18px; width: 14px; height: 14px; border: 2px solid silver; border-radius: 50%; }
#line { position: absolute; width: 2px; height: 90px; background: rgba(255,255,255,0.6); top: 5px; right: 0; transform: rotate(20deg); }
#endScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; z-index: 999; }
#endScreen button { margin-top: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>

<a href="fromScratch.html" class="homeButton">Back to Fishing Page</a>

<h1>🎣 Catch the Fish!</h1>

<div id="scoreBoard">Score: 0 / 5</div>

<div class="game-key">
    🟦 Legal Fish = GOOD | 🟨 Illegal Fish = BAD
</div>

<div id="gameArea"></div>

<div id="rod">
    <div id="line"></div>
</div>

<div id="endScreen">
    <div id="endMessage"></div>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>
let score = 0; let gameOver = false; let spawnLoop;
const gameArea = document.getElementById("gameArea");
const scoreBoard = document.getElementById("scoreBoard");
const endScreen = document.getElementById("endScreen");
const endMessage = document.getElementById("endMessage");
const rod = document.getElementById("rod");

// Rod Animation
document.body.addEventListener("click", (e) => {
    if (gameOver) return;
    if (e.target.tagName === "BUTTON" || e.target.classList.contains("homeButton")) return;
    rod.style.transition = "transform 0.2s ease-out";
    rod.style.transform = "rotate(-45deg)";
    setTimeout(() => { rod.style.transform = "rotate(-20deg)"; }, 200);
});

function spawnFish() {
    if (gameOver) return;
    const fish = document.createElement("div");
    fish.classList.add("fish");
    
    // 80% chance of a legal fish
    const isLegal = Math.random() < 0.8;
    fish.textContent = isLegal ? "🐟" : "🐠";
    fish.dataset.type = isLegal ? "legal" : "illegal";
    
    fish.style.top = Math.random() * 70 + "vh";
    fish.style.left = "-50px";
    gameArea.appendChild(fish);
    
    let speed = Math.random() * 3 + 2;
    function move() {
        if (gameOver) return;
        let left = parseFloat(fish.style.left);
        fish.style.left = left + speed + "px";
        if (left > window.innerWidth) { fish.remove(); } else { requestAnimationFrame(move); }
    }
    move();
    
    fish.onclick = () => {
        if (gameOver) return;
        if (fish.dataset.type === "legal") {
            score++; fish.remove(); updateScore();
            if (score >= 5) winGame();
        } else { loseGame(); }
    };
}

function updateScore() { scoreBoard.textContent = `Score: ${score} / 5`; }
function winGame() { gameOver = true; clearInterval(spawnLoop); endMessage.textContent = "🎉 YOU WIN!"; endScreen.style.display = "flex"; }
function loseGame() { gameOver = true; clearInterval(spawnLoop); endMessage.textContent = "💀 YOU LOSE!"; endScreen.style.display = "flex"; }
function restartGame() { score = 0; gameOver = false; gameArea.innerHTML = ""; endScreen.style.display = "none"; updateScore(); startGame(); }
function startGame() { spawnLoop = setInterval(spawnFish, 800); }

startGame();
</script>
</body>
</html>
